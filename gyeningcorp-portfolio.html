<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GYENINGCORP — App Nexus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:   #00f5ff;
      --purple: #b400ff;
      --pink:   #ff2d78;
      --gold:   #ffd700;
      --dark:   #04060f;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── THREE.JS CANVAS ── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── HEADER ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 28px;
      pointer-events: none;
    }
    #logo {
      font-size: clamp(22px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: .25em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--cyan), var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(0,245,255,.5));
      animation: pulse 4s ease-in-out infinite;
    }
    #subtitle {
      margin-top: 6px;
      font-size: clamp(10px, 1.4vw, 14px);
      letter-spacing: .35em;
      color: rgba(255,255,255,.35);
      text-transform: uppercase;
    }
    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 18px rgba(0,245,255,.4)); }
      50%      { filter: drop-shadow(0 0 34px rgba(180,0,255,.7)); }
    }

    /* ── HINT ── */
    #hint {
      position: fixed;
      bottom: 22px; left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: .2em;
      color: rgba(255,255,255,.2);
      z-index: 10;
      pointer-events: none;
    }

    /* ── SCENE WRAPPER ── */
    #scene {
      position: fixed;
      inset: 0;
      z-index: 5;
      perspective: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── 3-D CAROUSEL ── */
    #carousel {
      position: relative;
      width: 220px;
      height: 300px;
      transform-style: preserve-3d;
      animation: spin 40s linear infinite;
      cursor: grab;
    }
    #carousel:active { cursor: grabbing; }
    #carousel.paused { animation-play-state: paused; }
    @keyframes spin {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(360deg); }
    }

    /* ── CARD ── */
    .card {
      position: absolute;
      width: 210px;
      height: 290px;
      top: 0; left: 0;
      transform-style: preserve-3d;
      transition: transform .6s cubic-bezier(.4,0,.2,1);
    }
    .card.flipped { transform: var(--place) rotateY(180deg) !important; }
    .card:hover { z-index: 20; }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* FRONT */
    .card-front {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 18px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(8,12,28,.72);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 0 1px rgba(255,255,255,.06),
                  0 20px 60px rgba(0,0,0,.6),
                  inset 0 1px 0 rgba(255,255,255,.1);
      cursor: pointer;
      transition: box-shadow .3s, transform .3s;
    }
    .card-front:hover {
      box-shadow: 0 0 0 1px rgba(255,255,255,.18),
                  0 0 40px var(--glow),
                  0 20px 60px rgba(0,0,0,.7),
                  inset 0 1px 0 rgba(255,255,255,.15);
      transform: translateZ(24px) scale(1.04);
    }

    .card-gradient {
      position: absolute;
      inset: 0;
      opacity: .18;
      transition: opacity .3s;
    }
    .card-front:hover .card-gradient { opacity: .32; }

    .card-glow-ring {
      position: absolute;
      top: -40px; left: 50%;
      transform: translateX(-50%);
      width: 160px; height: 160px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity .3s;
      filter: blur(28px);
    }
    .card-front:hover .card-glow-ring { opacity: .55; }

    .card-icon {
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,.6));
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }
    .card-name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .06em;
      text-align: center;
      position: relative;
      z-index: 1;
      text-shadow: 0 0 20px var(--glow);
    }
    .card-category {
      font-size: 9px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }
    .card-tagline {
      font-size: 11px;
      color: rgba(255,255,255,.55);
      text-align: center;
      margin-top: 8px;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }
    .flip-hint {
      position: absolute;
      bottom: 12px; right: 14px;
      font-size: 8px;
      letter-spacing: .15em;
      color: rgba(255,255,255,.25);
      text-transform: uppercase;
    }

    /* BACK */
    .card-back {
      background: rgba(6,9,20,.9);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 22px;
      box-shadow: 0 0 0 1px rgba(255,255,255,.06),
                  0 20px 60px rgba(0,0,0,.7);
    }
    .back-icon { font-size: 44px; }
    .back-name {
      font-size: 17px;
      font-weight: 800;
      text-align: center;
      letter-spacing: .05em;
    }
    .back-desc {
      font-size: 11px;
      color: rgba(255,255,255,.55);
      text-align: center;
      line-height: 1.65;
    }
    .launch-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      padding: 10px 22px;
      border-radius: 30px;
      border: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      color: #000;
      transition: transform .2s, box-shadow .2s;
    }
    .launch-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 24px var(--glow);
    }
    .back-close {
      font-size: 9px;
      letter-spacing: .15em;
      color: rgba(255,255,255,.25);
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 2px;
    }
    .back-close:hover { color: rgba(255,255,255,.55); }

    /* ── DETAIL OVERLAY ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }
    #overlay.open { display: flex; }

    /* ── NAV DOTS ── */
    #dots {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      cursor: pointer;
      transition: background .3s, transform .3s;
    }
    .dot.active {
      background: var(--cyan);
      transform: scale(1.5);
      box-shadow: 0 0 8px var(--cyan);
    }
  </style>
</head>

/* ═══════════════════════════════════════════
   THREE.JS BACKGROUND
═══════════════════════════════════════════ */
(function initThree() {
  const canvas = document.getElementById('bg');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
  camera.position.z = 5;

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starCount = 3000;
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i++) starPositions[i] = (Math.random() - 0.5) * 400;
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.18, transparent: true, opacity: 0.7 });
  scene.add(new THREE.Points(starGeo, starMat));

  // Neon grid floor
  const gridHelper = new THREE.GridHelper(80, 40, 0x00f5ff, 0x0a0a2e);
  gridHelper.position.y = -7;
  gridHelper.material.opacity = 0.3;
  gridHelper.material.transparent = true;
  scene.add(gridHelper);

  // Floating orbs (ambient light sources)
  const orbColors = [0x00f5ff, 0xb400ff, 0xff2d78];
  orbColors.forEach((c, i) => {
    const geo = new THREE.SphereGeometry(0.08, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: c });
    const orb = new THREE.Mesh(geo, mat);
    const angle = (i / orbColors.length) * Math.PI * 2;
    orb.position.set(Math.cos(angle) * 4, 0, Math.sin(angle) * 4);
    scene.add(orb);
    const light = new THREE.PointLight(c, 2, 15);
    orb.add(light);
    orb.userData.angle = angle;
    orb.userData.radius = 4;
    orb.userData.speed = 0.3 + i * 0.1;
  });

  // Nebula particles
  const nebulaGeo = new THREE.BufferGeometry();
  const nCount = 500;
  const nPos = new Float32Array(nCount * 3);
  const nCol = new Float32Array(nCount * 3);
  const nebColors = [[0,0.96,1],[0.71,0,1],[1,0.18,0.47]];
  for (let i = 0; i < nCount; i++) {
    nPos[i*3]   = (Math.random()-0.5)*60;
    nPos[i*3+1] = (Math.random()-0.5)*30;
    nPos[i*3+2] = (Math.random()-0.5)*20 - 10;
    const c = nebColors[Math.floor(Math.random()*3)];
    nCol[i*3]=c[0]; nCol[i*3+1]=c[1]; nCol[i*3+2]=c[2];
  }
  nebulaGeo.setAttribute('position', new THREE.BufferAttribute(nPos, 3));
  nebulaGeo.setAttribute('color', new THREE.BufferAttribute(nCol, 3));
  const nebMat = new THREE.PointsMaterial({ size: 0.35, vertexColors: true, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending });
  scene.add(new THREE.Points(nebulaGeo, nebMat));

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  let t = 0;
  (function animate() {
    requestAnimationFrame(animate);
    t += 0.005;
    // rotate stars slowly
    scene.children[0].rotation.y = t * 0.05;
    // move grid
    gridHelper.material.opacity = 0.25 + Math.sin(t) * 0.05;
    // animate orbs
    scene.children.forEach(obj => {
      if (obj.userData.angle !== undefined) {
        obj.userData.angle += obj.userData.speed * 0.005;
        obj.position.x = Math.cos(obj.userData.angle) * obj.userData.radius;
        obj.position.z = Math.sin(obj.userData.angle) * obj.userData.radius;
        obj.position.y = Math.sin(obj.userData.angle * 0.7) * 2;
      }
    });
    renderer.render(scene, camera);
  })();
})();

/* ═══════════════════════════════════════════
   3-D CARD CAROUSEL
═══════════════════════════════════════════ */
const carousel = document.getElementById('carousel');
const dotsEl   = document.getElementById('dots');
const COUNT     = APPS.length;
const RADIUS    = Math.max(320, COUNT * 44);
let currentAngle = 0;
let targetAngle  = 0;
let isDragging   = false;
let dragStartX   = 0;
let dragStartAngle = 0;
let activeCard   = -1;
let animFrame;

APPS.forEach((app, i) => {
  const angle = (i / COUNT) * 360;
  const rad   = angle * Math.PI / 180;
  const glow  = app.colors[0];

  /* card wrapper */
  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--glow', glow);
  const place = `rotateY(${angle}deg) translateZ(${RADIUS}px)`;
  card.style.setProperty('--place', place);
  card.style.transform = place;

  /* gradient for bg */
  const gradCss = app.colors.length >= 3
    ? `linear-gradient(135deg, ${app.colors[0]}, ${app.colors[1]}, ${app.colors[2]})`
    : `linear-gradient(135deg, ${app.colors[0]}, ${app.colors[1]})`;

  /* FRONT */
  const front = document.createElement('div');
  front.className = 'card-face card-front';
  front.innerHTML = `
    <div class="card-gradient" style="background:${gradCss}"></div>
    <div class="card-glow-ring" style="background:${glow}"></div>
    <div class="card-icon">${app.icon}</div>
    <div class="card-name">${app.name}</div>
    <div class="card-category">${app.category}</div>
    <div class="card-tagline">${app.tagline}</div>
    <div class="flip-hint">tap for info ›</div>
  `;
  front.addEventListener('click', () => flipCard(i));

  /* BACK */
  const back = document.createElement('div');
  back.className = 'card-face card-back';
  back.innerHTML = `
    <div class="back-icon">${app.icon}</div>
    <div class="back-name" style="color:${glow};text-shadow:0 0 16px ${glow}">${app.name}</div>
    <div class="back-desc">${app.desc}</div>
    <a class="launch-btn" href="${app.url}" target="_blank" rel="noopener"
       style="background:${gradCss};color:#000;box-shadow:0 0 18px ${glow}44">
      🚀 LAUNCH
    </a>
    <div class="back-close" onclick="flipCard(${i})">← BACK</div>
  `;

  card.appendChild(front);
  card.appendChild(back);
  carousel.appendChild(card);

  /* dot */
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.title = app.name;
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

function flipCard(i) {
  const cards = carousel.querySelectorAll('.card');
  const card  = cards[i];
  if (card.classList.contains('flipped')) {
    card.classList.remove('flipped');
    card.style.transform = card.style.getPropertyValue('--place') || `rotateY(${(i/COUNT)*360}deg) translateZ(${RADIUS}px)`;
    activeCard = -1;
  } else {
    // un-flip any other
    cards.forEach((c,j) => { if (j!==i && c.classList.contains('flipped')) { c.classList.remove('flipped'); } });
    card.classList.add('flipped');
    activeCard = i;
    goTo(i);
  }
}

function goTo(i) {
  const angle = -(i / COUNT) * 360;
  targetAngle = angle;
  carousel.classList.add('paused');
  smoothRotate();
}

function smoothRotate() {
  cancelAnimationFrame(animFrame);
  const diff = targetAngle - currentAngle;
  if (Math.abs(diff) < 0.05) {
    currentAngle = targetAngle;
    applyAngle(currentAngle);
    updateDots(currentAngle);
    return;
  }
  currentAngle += diff * 0.08;
  applyAngle(currentAngle);
  updateDots(currentAngle);
  animFrame = requestAnimationFrame(smoothRotate);
}

function applyAngle(angle) {
  carousel.style.transform = `rotateY(${angle}deg)`;
}

function updateDots(angle) {
  const norm   = (((-angle) % 360) + 360) % 360;
  const active = Math.round(norm / (360 / COUNT)) % COUNT;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === active));
}

/* ── DRAG ── */
function onDown(e) {
  isDragging  = true;
  dragStartX  = e.touches ? e.touches[0].clientX : e.clientX;
  dragStartAngle = currentAngle;
  carousel.classList.add('paused');
  cancelAnimationFrame(animFrame);
}
function onMove(e) {
  if (!isDragging) return;
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const delta = (x - dragStartX) * 0.25;
  currentAngle = dragStartAngle + delta;
  applyAngle(currentAngle);
  updateDots(currentAngle);
}
function onUp() {
  if (!isDragging) return;
  isDragging = false;
  // snap to nearest
  const norm   = (((-currentAngle) % 360) + 360) % 360;
  const nearest = Math.round(norm / (360 / COUNT)) % COUNT;
  targetAngle  = -(nearest / COUNT) * 360;
  smoothRotate();
}

carousel.addEventListener('mousedown',  onDown);
carousel.addEventListener('touchstart', onDown, { passive: true });
window.addEventListener('mousemove',   onMove);
window.addEventListener('touchmove',   onMove, { passive: true });
window.addEventListener('mouseup',     onUp);
window.addEventListener('touchend',    onUp);

/* ── RESUME SPIN ON IDLE ── */
let idleTimer;
function resetIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (activeCard === -1) carousel.classList.remove('paused');
  }, 6000);
}
window.addEventListener('mousemove', resetIdle);
window.addEventListener('touchmove', resetIdle);

/* init dots */
updateDots(0);
</script>
</body>
</html>
