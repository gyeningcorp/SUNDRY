<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#020510;--cyan:#00f5ff;--purple:#b400ff;--pink:#ff2d78}
html,body{width:100%;min-height:100%;background:var(--bg);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#header{position:relative;z-index:10;text-align:center;padding:40px 20px 20px}
#logo{font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:.3em;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:pulse 4s ease-in-out infinite}
#tagline{margin-top:8px;font-size:clamp(10px,1.5vw,13px);letter-spacing:.4em;color:rgba(255,255,255,.3);text-transform:uppercase}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 24px rgba(0,245,255,.5))}50%{filter:drop-shadow(0 0 40px rgba(180,0,255,.8))}}
/* SECTION LABELS */
.section-label{position:relative;z-index:5;max-width:1400px;margin:0 auto;padding:0 clamp(16px,5vw,80px);display:flex;align-items:center;gap:16px}
.section-label span{font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.3);white-space:nowrap}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.08),transparent)}
/* FEATURED STRIP */
#featured{position:relative;z-index:5;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:32px;padding:20px clamp(16px,5vw,80px) 40px;max-width:1400px;margin:0 auto}
#featured .app-card .phone{width:185px;height:336px;border-radius:30px}
#featured .app-card .phone::before{width:54px;height:12px;top:10px}
#featured .app-card .phone::after{width:52px;height:4px;bottom:7px}
#featured .app-card .phone-screen{border-radius:28px}
#featured .app-card .phone-overlay{border-radius:28px}
#featured .app-card .card-name{font-size:15px}
#featured .app-card .overlay-tap{font-size:38px}
/* badge */
.feat-badge{position:absolute;top:12px;left:12px;z-index:30;background:linear-gradient(135deg,var(--glow,#fff),rgba(255,255,255,.6));border-radius:6px;padding:2px 7px;font-size:7px;font-weight:800;letter-spacing:.15em;color:#000;text-transform:uppercase}
/* ALL APPS GRID */
#grid{position:relative;z-index:5;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:24px;padding:20px clamp(16px,5vw,80px) 100px;max-width:1400px;margin:0 auto}
.app-card{cursor:pointer;display:flex;flex-direction:column;align-items:center;transition:transform .35s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;will-change:transform}
.phone{width:155px;height:280px;border-radius:26px;background:#111;border:2px solid #2a2a2a;box-shadow:0 0 0 1px #3333,inset 0 0 0 2px #1a1a1a,0 24px 60px rgba(0,0,0,.9);position:relative;overflow:hidden;transition:box-shadow .35s}
.app-card:hover .phone{box-shadow:0 0 0 1px var(--glow,#fff3),0 0 28px var(--glow,#fff2),0 32px 80px rgba(0,0,0,.95)}
.phone::before{content:'';position:absolute;top:9px;left:50%;transform:translateX(-50%);width:46px;height:10px;background:#000;border-radius:10px;z-index:10}
.phone::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:44px;height:3px;background:#ffffff1a;border-radius:2px;z-index:10}
.phone-screen{position:absolute;inset:0;overflow:hidden;border-radius:24px}
.phone-overlay{position:absolute;inset:0;z-index:20;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;border-radius:24px;transition:background .3s}
.app-card:hover .phone-overlay{background:rgba(0,0,0,.45)}
.overlay-tap{font-size:32px;opacity:0;transform:scale(.7);transition:opacity .3s,transform .3s}
.app-card:hover .overlay-tap{opacity:1;transform:scale(1)}
.card-label{margin-top:11px;text-align:center}
.card-name{font-size:13px;font-weight:700;letter-spacing:.04em}
.card-cat{font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.38);text-transform:uppercase;margin-top:3px}
#modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);align-items:center;justify-content:center}
#modal.open{display:flex}
#modal-wrap{display:flex;align-items:center;gap:52px;max-width:900px;width:100%;padding:0 24px;flex-wrap:wrap;justify-content:center}
#modal-phone{width:240px;height:440px;border-radius:36px;background:#111;border:2.5px solid #2a2a2a;position:relative;overflow:hidden;flex-shrink:0;animation:floatPhone 5s ease-in-out infinite}
#modal-phone::before{content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);width:62px;height:12px;background:#000;border-radius:12px;z-index:10}
#modal-phone::after{content:'';position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:62px;height:4px;background:#ffffff1a;border-radius:4px;z-index:10}
#modal-screen{position:absolute;inset:0;overflow:hidden;border-radius:34px}
@keyframes floatPhone{0%,100%{transform:translateY(0) rotateY(-6deg) rotateX(2deg)}50%{transform:translateY(-14px) rotateY(6deg) rotateX(-2deg)}}
#modal-info{max-width:320px}
#m-icon{font-size:48px;margin-bottom:10px}
#m-name{font-size:26px;font-weight:900;letter-spacing:.05em;margin-bottom:5px}
#m-cat{font-size:10px;letter-spacing:.3em;color:rgba(255,255,255,.38);text-transform:uppercase;margin-bottom:14px}
#m-desc{font-size:13px;color:rgba(255,255,255,.62);line-height:1.72;margin-bottom:26px}
#m-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 30px;border-radius:40px;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;color:#000;transition:transform .2s,box-shadow .2s}
#m-btn:hover{transform:scale(1.06)}
#modal-x{position:fixed;top:22px;right:26px;font-size:22px;cursor:pointer;color:rgba(255,255,255,.35);transition:color .2s;z-index:1001;line-height:1}
#modal-x:hover{color:#fff}
</style>
</head>

/* THREE.JS BG */
(function(){
  const cv=document.getElementById('bg');
  const r=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  r.setPixelRatio(Math.min(devicePixelRatio,2));r.setSize(innerWidth,innerHeight);
  const sc=new THREE.Scene(),cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,1000);
  cam.position.z=6;
  const sa=new Float32Array(5000*3);for(let i=0;i<5000*3;i++)sa[i]=(Math.random()-.5)*500;
  const sp=new THREE.BufferGeometry();sp.setAttribute('position',new THREE.BufferAttribute(sa,3));
  sc.add(new THREE.Points(sp,new THREE.PointsMaterial({color:0xffffff,size:.14,transparent:true,opacity:.65})));
  const np=new Float32Array(600*3),nc=new Float32Array(600*3),NK=[[0,.96,1],[.71,0,1],[1,.18,.47],[1,.85,0]];
  for(let i=0;i<600;i++){np[i*3]=(Math.random()-.5)*120;np[i*3+1]=(Math.random()-.5)*60;np[i*3+2]=(Math.random()-.5)*40-20;const c=NK[i%4];nc[i*3]=c[0];nc[i*3+1]=c[1];nc[i*3+2]=c[2];}
  const ng=new THREE.BufferGeometry();ng.setAttribute('position',new THREE.BufferAttribute(np,3));ng.setAttribute('color',new THREE.BufferAttribute(nc,3));
  sc.add(new THREE.Points(ng,new THREE.PointsMaterial({size:.45,vertexColors:true,transparent:true,opacity:.18,blending:THREE.AdditiveBlending,depthWrite:false})));
  const mkm=(g,c)=>new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:c,wireframe:true,opacity:.12,transparent:true}));
  const m1=mkm(new THREE.IcosahedronGeometry(.5,0),0x00f5ff);m1.position.set(-8,3,-5);sc.add(m1);
  const m2=mkm(new THREE.OctahedronGeometry(.4,0),0xb400ff);m2.position.set(8,-2,-4);sc.add(m2);
  const m3=mkm(new THREE.TetrahedronGeometry(.35,0),0xff2d78);m3.position.set(0,-5,-3);sc.add(m3);
  window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();r.setSize(innerWidth,innerHeight);});
  let t=0;(function loop(){requestAnimationFrame(loop);t+=.004;sc.children[0].rotation.y=t*.03;m1.rotation.x=t*.4;m1.rotation.y=t*.3;m2.rotation.x=t*.3;m2.rotation.z=t*.5;m3.rotation.y=t*.6;m3.rotation.x=t*.2;r.render(sc,cam);})();
})();

/* BUILD CARDS */
const featuredEl=document.getElementById('featured');
const grid=document.getElementById('grid');

function makeCard(app,i,container){
  const g=app.colors.length>=3?`linear-gradient(135deg,${app.colors[0]},${app.colors[1]},${app.colors[2]})`:`linear-gradient(135deg,${app.colors[0]},${app.colors[1]})`;
  const card=document.createElement('div');
  card.className='app-card';card.style.setProperty('--glow',app.colors[0]);
  const badge=app.featured?`<div class="feat-badge" style="background:${g}">&#x2605; Featured</div>`:'';
  card.innerHTML=`<div class="phone">${badge}<div class="phone-screen">${S[app.screen]}</div><div class="phone-overlay"><div class="overlay-tap">&#x1F446;</div></div></div><div class="card-label"><div class="card-name" style="color:${app.colors[0]};text-shadow:0 0 10px ${app.colors[0]}55">${app.name}</div><div class="card-cat">${app.category}</div></div>`;
  card.addEventListener('mousemove',e=>{const rc=card.getBoundingClientRect(),x=(e.clientX-rc.left)/rc.width-.5,y=(e.clientY-rc.top)/rc.height-.5;card.style.transform=`translateY(-10px) rotateX(${-y*18}deg) rotateY(${x*18}deg) scale(1.04)`;});
  card.addEventListener('mouseleave',()=>{card.style.transform='';});
  card.addEventListener('click',()=>openModal(i));
  container.appendChild(card);
}

APPS.forEach((app,i)=>{
  if(app.featured) makeCard(app,i,featuredEl);
  else makeCard(app,i,grid);
});

/* MODAL */
const modal=document.getElementById('modal'),ms=document.getElementById('modal-screen'),mp=document.getElementById('modal-phone');
function openModal(i){
  const app=APPS[i];
  const g=app.colors.length>=3?`linear-gradient(135deg,${app.colors[0]},${app.colors[1]},${app.colors[2]})`:`linear-gradient(135deg,${app.colors[0]},${app.colors[1]})`;
  ms.innerHTML=S[app.screen];
  document.getElementById('m-icon').textContent=app.icon;
  const mn=document.getElementById('m-name');mn.textContent=app.name;mn.style.background=g;mn.style.webkitBackgroundClip='text';mn.style.webkitTextFillColor='transparent';mn.style.backgroundClip='text';
  document.getElementById('m-cat').textContent=app.category;
  document.getElementById('m-desc').textContent=app.desc;
  const btn=document.getElementById('m-btn');btn.href=app.url;btn.style.background=g;
  mp.style.boxShadow=`0 0 0 1px #4445,0 0 50px ${app.colors[0]}44,0 40px 100px rgba(0,0,0,.9)`;
  modal.classList.add('open');document.body.style.overflow='hidden';
}
document.getElementById('modal-x').addEventListener('click',closeModal);
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
function closeModal(){modal.classList.remove('open');document.body.style.overflow='';}

/* PARALLAX */
let mx=0,my=0;
window.addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5)*8;my=(e.clientY/innerHeight-.5)*8;});
(function pl(){requestAnimationFrame(pl);const t=`perspective(1400px) rotateX(${-my*.25}deg) rotateY(${mx*.25}deg)`;featuredEl.style.transform=t;grid.style.transform=t;})();
